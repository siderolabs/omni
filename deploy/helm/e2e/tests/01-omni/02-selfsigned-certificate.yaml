apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: omni-selfsigned-cert
spec:
  secretName: omni-tls-secret

  duration: 2160h
  renewBefore: 360h
  privateKey:
    algorithm: RSA
    encoding: PKCS1
    size: 2048

  commonName: omni.example.org
  dnsNames:
    - omni.example.org
    - siderolink.omni.example.org
    - kubernetes.omni.example.org
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
    group: cert-manager.io