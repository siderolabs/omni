# -- Provide a name in place of `"omni"`.
nameOverride: ""

# -- String to fully override `"omni.fullname"`.
fullnameOverride: ""

# -- String to fully override `"omni.namespace"`.
namespaceOverride: ""

# -- Number of replicas to run.
# Omni currently only supports a single replica.
# If embedded etcd is used, this value should remain at 1.
# If an external etcd cluster is used, multiple replicas can be used, but they will run an etcd election and only one instance will be active at a time, others will be standby.
replicaCount: 1

# Deployment strategy. Omni currently only supports Recreate strategy.
strategy:
  # -- Deployment strategy type.
  type: Recreate

# Omni image configuration.
image:
  # -- Repository to use for Omni.
  repository: ghcr.io/siderolabs/omni
  # -- Image pull policy for Omni.
  pullPolicy: IfNotPresent
  # -- Tag to use for Omni.
  tag: ""

# -- Set to true to bypass the SemVer check (e.g. if using a custom build or nightly tag).
skipVersionCheck: false

# -- Secrets with credentials to pull images from a private registry.
imagePullSecrets: []

# -- Extra arguments to pass to Omni.
# Note: --config-path is automatically generated by the chart based on the base config and additionalConfigSources.
args: []
  #- --debug

# -- Additional config sources to merge on top of the base config.
# These are merged in order: base config (from config: section) -> additionalConfigSources (in order) -> flags.
# This is useful for bringing in secrets from external sources (e.g., External Secrets Operator).
# Each source must contain a valid Omni config YAML that will be merged with the base config.
additionalConfigSources: []
  # Example: Load OIDC credentials from an existing secret
  #- existingSecret: oidc-credentials
  #  key: config.yaml  # optional, defaults to config.yaml
  # Example: Load additional settings from a ConfigMap
  #- existingConfigMap: extra-settings
  #  key: settings.yaml

# Omni Configuration
#
# For the full configuration reference, see:
# - The config reference: https://docs.siderolabs.com/omni/reference/omni-configuration
# - Config JSON schema: https://github.com/siderolabs/omni/blob/main/internal/pkg/config/schema.json
#
# The config block below is generated by helmvaluesgen.
# To change it, edit deploy/helm/omni/config-overrides.yaml and run "make generate".
#
# ---------- BEGIN helmvaluesgen config ----------
# Code generated by helmvaluesgen; DO NOT EDIT.
config:
  # Account contains account-related configuration.
  account:
    # Unique identifier and name for this Omni instance.
    # Must be a UUID and not changed during the lifetime of the installation.
    #id: ""
    # -- Name is the human-readable name of the account.
    name: app
    # @ignored
    # UserPilot contains UserPilot-related configuration.
    userPilot:
      # AppToken is the UserPilot application token.
      #appToken: ""
  # Services contains configuration for various services run by Omni.
  services:
    # Api contains API/UI service configuration.
    api:
      # Endpoint is the network endpoint the service listens on. It is in the form "host:port".
      #endpoint: 0.0.0.0:8080
      # -- The advertised URL for the main Omni GRPC and HTTP API and Web UI.
      # MUST be specified as a full URL, including scheme (http:// or https://).
      # It MUST match the URL of the main ingress if ingress is used.
      advertisedURL: https://omni.example.com
      # CertFile is the path to the TLS certificate file for the service.
      #certFile: ""
      # KeyFile is the path to the TLS key file for the service.
      #keyFile: ""
    # @ignored
    # DevServerProxy is the node dev server proxy service configuration. It exists for the development purposes
    # only.
    devServerProxy:
      # Endpoint is the network endpoint the dev server proxy service listens on. It is in the form "host:port".
      #endpoint: ""
      # AdvertisedURL is the URL that the dev server proxy service advertises to clients. It is in the form
      # "http(s)://host:port". When not set, it is generated by the system based on the endpoint and TLS cert/key
      # configuration.
      #advertisedURL: ""
      # CertFile is the path to the TLS certificate file for the dev server proxy service.
      #certFile: ""
      # KeyFile is the path to the TLS key file for the dev server proxy service.
      #keyFile: ""
      # ProxyTo is the address to which the dev server proxy service forwards incoming requests. It is in the form
      # "http(s)://host:port".
      #proxyTo: ""
    # @ignored
    # Metrics contains metrics service configuration.
    metrics:
      # Endpoint is the network endpoint the service listens on. It is in the form "host:port".
      #endpoint: 0.0.0.0:2122
      # AdvertisedURL is the URL that the service advertises to clients. It is in the form "http(s)://host:port". When
      # not set, it is generated by the system based on the endpoint and TLS cert/key configuration.
      #advertisedURL: ""
      # CertFile is the path to the TLS certificate file for the service.
      #certFile: ""
      # KeyFile is the path to the TLS key file for the service.
      #keyFile: ""
    # KubernetesProxy contains Kubernetes proxy service configuration. It is the service responsible for proxying
    # Kubernetes API requests to the clusters.
    kubernetesProxy:
      # Endpoint is the network endpoint the Kubernetes proxy service listens on. It is in the form "host:port".
      #endpoint: 0.0.0.0:8095
      # -- The advertised URL for the Kubernetes API Proxy.
      # MUST be specified as a full URL, including scheme (https://).
      # It MUST match the URL of the kubernetes proxy ingress if ingress is used.
      advertisedURL: https://kubernetes.omni.example.com
      # CertFile is the path to the TLS certificate file for the Kubernetes proxy service.
      #certFile: ""
      # KeyFile is the path to the TLS key file for the Kubernetes proxy service.
      #keyFile: ""
      # OidcCacheBaseDir overrides the base cache directory for kubelogin in generated kubeconfigs. When empty,
      # kubelogin uses its default (~/.kube/cache/oidc-login).
      #oidcCacheBaseDir: ""
      # OidcCacheIsolation isolates OIDC token caches across clusters by appending a per-context subdirectory to the
      # cache directory in generated kubeconfigs.
      #oidcCacheIsolation: false
    # Siderolink contains SideroLink service configuration. It is the service responsible for node<>Omni
    # connectivity via WireGuard.
    siderolink:
      # @ignored
      # WireGuard contains WireGuard-specific configuration for the SideroLink service.
      wireGuard:
        # Endpoint is the network endpoint the WireGuard interface listens on. It is in the form "ip:port" (IP address
        # is required, not hostname).
        #endpoint: 0.0.0.0:50180
        # The advertised address for WireGuard connections.
        # MUST be specified in IP:PORT format (hostname is NOT supported, must be an IP address).
        # In most setups, this is either:
        # - NodePort: Use the externally accessible IP of a node and service.wireguard.nodePort (e.g.,
        # "203.0.113.10:30180")
        # - LoadBalancer: Use the LoadBalancer's external IP and service.wireguard.port (e.g., "203.0.113.50:50180")
        #advertisedEndpoint: ""
      # -- JoinTokensMode configures how machine join tokens are generated and used. Set to strict to use the secure
      # join tokens mode.
      joinTokensMode: strict
      # DisableLastEndpoint controls whether the SideroLink service should stop using the last known endpoint of a
      # node when it becomes unreachable via WireGuard.
      #disableLastEndpoint: false
      # UseGRPCTunnel controls whether the SideroLink service should tunnel WireGuard traffic over gRPC, in setups
      # where direct Wireguard connectivity is not possible (e.g., due to firewall restrictions). When enabled, the
      # SideroLink connections from Talos machines will be configured to use the tunnel mode, regardless of their
      # individual configuration.
      #useGRPCTunnel: false
      # -- EventSinkPort is the port to be used by the nodes to publish their events over SideroLink to Omni.
      eventSinkPort: 8091
      # LogServerPort is the port to be used by the nodes to send their logs over SideroLink to Omni.
      #logServerPort: 8092
      # BandwidthLimitMbps is the maximum total bandwidth in megabits per second through the SideroLink tunnel. Uses a
      # token bucket algorithm: the rate controls sustained throughput while burst allows temporary spikes. Zero means
      # unlimited.
      #bandwidthLimitMbps: 0
      # BandwidthLimitBurstBytes is the maximum number of bytes that can pass through the SideroLink tunnel in a
      # single burst (token bucket capacity). The bucket refills continuously at the rate set by bandwidthLimitMbps.
      # When zero and bandwidthLimitMbps is set, defaults to one second worth of the rate. For example, with
      # bandwidthLimitMbps=10 (1.25 MB/s) and burstBytes=5000000 (5 MB), up to 5 MB can transfer instantly, then
      # throughput settles to 1.25 MB/s.
      #bandwidthLimitBurstBytes: 0
    # MachineAPI contains SideroLink API service configuration. It is responsible for provisioning SideroLink
    # connections by validating node join requests and issuing machine join tokens.
    machineAPI:
      # Endpoint is the network endpoint the service listens on. It is in the form "host:port".
      #endpoint: ""
      # -- The advertised URL for the SideroLink (Machine) API.
      # MUST be specified as a full URL, including scheme (http:// or https://).
      # It MUST match the URL of the siderolink API ingress if ingress is used.
      advertisedURL: https://siderolink.omni.example.com
      # CertFile is the path to the TLS certificate file for the service.
      #certFile: ""
      # KeyFile is the path to the TLS key file for the service.
      #keyFile: ""
    # @ignored
    # LocalResourceService contains local resource service configuration. Omni runs a local service to allow access
    # to its resources without authorization checks. It is primarily used by infra providers (e.g., sidecars).
    localResourceService:
      # Enabled controls whether the local resource service is enabled.
      #enabled: true
      # Port is the network port the local resource service listens on.
      #port: 8081
    # @ignored
    # EmbeddedDiscoveryService contains embedded discovery service configuration. Omni can run an embedded discovery
    # service to allow nodes to discover each other, instead of them resorting to discovery.talos.dev.
    embeddedDiscoveryService:
      # Enabled controls whether the embedded discovery service is enabled. It binds only to the SideroLink WireGuard
      # address.
      #enabled: true
      # Port is the network port the embedded discovery service listens on.
      #port: 8093
      # SnapshotsEnabled controls whether the embedded discovery service periodically persists snapshots of its state
      # to disk.
      #snapshotsEnabled: true
      # SnapshotsInterval is the interval at which the embedded discovery service persists snapshots of its state.
      #snapshotsInterval: 10m0s
      # LogLevel is the logging level used by the embedded discovery service.
      #logLevel: warn
      # SqliteTimeout is the timeout for SQLite operations used by the embedded discovery service.
      #sqliteTimeout: 30s
    # @ignored
    # LoadBalancer contains load balancer service configuration. It is responsible for creating and managing load
    # balancers of the clusters' control planes.
    loadBalancer:
      # MinPort is the minimum port number that can be picked by the load balancer service when allocating a new LB
      # port to a cluster.
      #minPort: 10000
      # MaxPort is the maximum port number that can be picked by the load balancer service when allocating a new LB
      # port to a cluster.
      #maxPort: 35000
      # DialTimeout is the timeout used by the load balancer service when dialing backend control plane nodes.
      #dialTimeout: 15s
      # KeepAlivePeriod is the period used by the load balancer service for keep-alive pings to backend control plane
      # nodes.
      #keepAlivePeriod: 30s
      # TCPUserTimeout is the TCP user timeout value set on connections between the load balancer and backend control
      # plane nodes.
      #tcpUserTimeout: 30s
      # HealthCheckInterval is the interval between health checks performed by the load balancer service on backend
      # control plane nodes.
      #healthCheckInterval: 20s
      # HealthCheckTimeout is the timeout for health checks performed by the load balancer service on backend control
      # plane nodes.
      #healthCheckTimeout: 15s
    # WorkloadProxy contains workload proxy service configuration. It is responsible for exposing workloads run on
    # the clusters via Omni to the outside world.
    workloadProxy:
      # -- Subdomain is the subdomain used by the workload proxy service to expose workloads. By default, it lives at
      # the same level as Omni (e.g., "omni-apps.example.com" for Omni at "omni.example.com"). When useOmniSubdomain
      # is true, it is placed under Omni's domain instead (e.g., "proxy.omni.example.com"). When useOmniSubdomain is
      # true and subdomain is empty, services are exposed directly as subdomains of Omni (e.g.,
      # "grafana.omni.example.com").
      subdomain: omni-workload
      # -- Enabled controls whether the workload proxy service is enabled.
      # In on-prem setups, it is often disabled.
      enabled: false
      # StopLBsAfter is the duration after which the workload proxy service stops load balancers for workloads that
      # have not received any traffic.
      #stopLBsAfter: 5m0s
      # UseOmniSubdomain controls whether the workload proxy subdomain is placed under Omni's own domain (as a
      # subdomain) rather than as a sibling. When true, the proxy domain becomes '<subdomain>.<omni-domain>' instead
      # of '<subdomain>.<parent-of-omni-domain>'. This also simplifies exposed service URLs to
      # '<alias>.<proxy-domain>' (without the instance name) and allows dashes in service aliases. When true and
      # subdomain is empty, services are exposed directly as subdomains of Omni (e.g., '<alias>.<omni-domain>').
      #useOmniSubdomain: false
  # Auth contains authentication-related configuration.
  auth:
    # Auth0 contains Auth0 authentication provider configuration.
    auth0:
      # -- Domain is the Auth0 domain.
      domain: ""
      # -- ClientID is the Auth0 client ID.
      clientID: ""
      # UseFormData controls whether the Auth0 provider should use form data for authentication requests. When true,
      # data to the token endpoint is transmitted as x-www-form-urlencoded data instead of JSON.
      #useFormData: false
      # -- Enabled controls whether the Auth0 authentication provider is enabled. Once set to true, it cannot be set
      # back to false.
      enabled: true
    # @ignored
    # Saml contains SAML authentication provider configuration.
    saml:
      # LabelRules defines mapping of SAML assertion attributes into Omni identity labels.
      #labelRules: {}
      # AttributeRules defines additional identity, fullname, firstname and lastname mappings.
      #attributeRules: {}
      # URL is the SAML provider URL. Mutually exclusive with metadata URL (.metadata).
      #url: ""
      # Metadata is the SAML provider metadata URL. Mutually exclusive with URL (.url).
      #metadata: ""
      # NameIDFormat is the SAML NameID format to be used.
      #nameIDFormat: ""
      # Enabled controls whether the SAML authentication provider is enabled.
      #enabled: false
    # @ignored
    # Oidc contains OIDC authentication provider configuration.
    oidc:
      # ProviderURL is the OIDC provider URL.
      #providerURL: ""
      # ClientID is the OIDC client ID.
      #clientID: ""
      # ClientSecret is the OIDC client secret.
      # Tip: Use additionalConfigSources to load this from an existing Secret.
      #clientSecret: ""
      # LogoutURL is the OIDC logout URL.
      #logoutURL: ""
      # Scopes is the list of OIDC scopes to request during authentication.
      #scopes: []
      # Enabled controls whether the OIDC authentication provider is enabled.
      #enabled: false
      # AllowUnverifiedEmail controls whether users with unverified emails (without email_verified claim) are allowed
      # to authenticate.
      #allowUnverifiedEmail: false
    # -- InitialUsers is a list of emails which should be created as admins when Omni is run for the first time.
    initialUsers: []
    # Example:
    #initialUsers:
    #  - initial-user-1@example.com
    #  - initial-user-2@example.com
    # @ignored
    # KeyPruner contains configuration for the public keys pruner (cleanup of old/expired keys).
    keyPruner:
      # Interval is the interval at which the key pruner runs.
      #interval: 10m0s
    # Suspended is whether the Omni account is suspended. If true, Omni will run on read-only mode with a warning
    # banner displayed in the UI.
    #suspended: false
    # @ignored
    # InitialServiceAccount contains configuration for the initial service account created when Omni is run for the
    # first time.
    initialServiceAccount:
      # Role is the role assigned to the initial service account.
      #role: Admin
      # KeyPath is the path where the initial service account key is stored.
      #keyPath: _out/initial-service-account-key
      # Name is the name of the initial service account.
      #name: automation
      # Lifetime is the lifetime of the initial service account key.
      #lifetime: 1h0m0s
      # Enabled controls whether the initial service account is created. This happens only on the first start of Omni.
      #enabled: false
    # @ignored
    # Limits contains configuration for user and service account limits.
    limits:
      # MaxUsers is the maximum number of users allowed. 0 means unlimited.
      #maxUsers: 0
      # MaxServiceAccounts is the maximum number of service accounts allowed. 0 means unlimited.
      #maxServiceAccounts: 0
  # @ignored
  # Logs contains logging-related configuration.
  logs:
    # Machine contains machine logs configuration.
    machine:
      # Storage contains configuration for machine logs storage.
      storage:
        # SqliteTimeout is the timeout for SQLite operations used for machine logs storage.
        #sqliteTimeout: 30s
        # CleanupInterval is the interval at which old machine logs are cleaned up.
        #cleanupInterval: 30m0s
        # CleanupOlderThan is the duration after which machine logs are considered old and eligible for cleanup.
        #cleanupOlderThan: 720h0m0s
        # MaxLinesPerMachine is the maximum number of log lines to keep per machine.
        #maxLinesPerMachine: 5000
        # MaxSize is the maximum allowed size (in bytes) of the machine logs table. When exceeded, the oldest entries
        # are removed globally across all machines. 0 means unlimited.
        #maxSize: 0
        # CleanupProbability is the probability of triggering the cleanup on each log write for that machine.
        #cleanupProbability: 0.01
    # Audit contains audit logs configuration.
    audit:
      # Enabled controls whether audit logging is enabled.
      #enabled: true
      # SqliteTimeout is the timeout for SQLite operations used for audit logs storage.
      #sqliteTimeout: 30s
      # RetentionPeriod is the duration after which audit logs are considered old and eligible for cleanup.
      #retentionPeriod: 720h0m0s
      # MaxSize is the maximum allowed size (in bytes) of the audit logs. When exceeded, the oldest entries are
      # removed. 0 means unlimited.
      #maxSize: 0
      # CleanupProbability is the probability of triggering size-based cleanup on each audit log write. When
      # triggered, a best-effort cleanup removes a bounded batch of the oldest rows to reduce the table size toward
      # maxSize; multiple cleanups may be required for the table to fall below maxSize. 0 disables size-based cleanup.
      #cleanupProbability: 0.01
    # ResourceLogger contains resource logger configuration. It logs the diffs for the watched resources when they
    # are updated.
    resourceLogger:
      # LogLevel is the logging level used by the resource logger.
      #logLevel: info
      # Types is the list of resource types to be logged by the resource logger.
      #types: []
  # Storage contains persistent storage related configuration.
  storage:
    # Default contains the default storage backend configuration.
    default:
      # -- Kind is the kind of the default storage backend.
      kind: etcd
      # Boltdb contains BoltDB storage backend configuration.
      boltdb:
        # -- Path to the primary BoltDB database.
        # Is **NOT USED by default**: only used if the storage.default.kind is set to "boltdb".
        # This path is mounted from the persistent volume by default.
        path: /data/omni-boltdb.db
      # Etcd contains etcd storage backend configuration.
      etcd:
        # Endpoints is the list of etcd endpoints. Only used when external etcd is used (i.e., embedded is false).
        #endpoints:
        #  - http://localhost:2379
        # DialKeepAliveTime is the keep-alive time for etcd client connections.
        #dialKeepAliveTime: 30s
        # DialKeepAliveTimeout is the keep-alive timeout for etcd client connections.
        #dialKeepAliveTimeout: 5s
        # CaFile is the path to the CA certificate file for etcd client connections.
        #caFile: etcd/ca.crt
        # CertFile is the path to the TLS certificate file for etcd client connections.
        #certFile: etcd/client.crt
        # KeyFile is the path to the TLS key file for etcd client connections.
        #keyFile: etcd/client.key
        # -- Embedded controls whether to use embedded etcd server as the storage backend.
        embedded: true
        # -- EmbeddedDBPath is the path where the embedded etcd database files are stored.
        # This path is mounted from the persistent volume by default.
        embeddedDBPath: /data/etcd/
        # EmbeddedUnsafeFsync controls whether the embedded etcd server should skip fsync calls for improved performance
        # at the cost of durability.
        #embeddedUnsafeFsync: false
        # RunElections controls whether the embedded etcd server should run leader elections. Should be false for
        # single-node Omni installations.
        #runElections: false
        # -- PrivateKeySource is the source of the private key for the embedded etcd server. It is used for decrypting
        # master key slot.
        privateKeySource: file:///omni.asc
        # PublicKeyFiles is the list of public key files for the embedded etcd server. They are used for encrypting keys
        # slots.
        #publicKeyFiles: []
    # Vault contains HashiCorp Vault storage backend configuration. It is used to store the storage encryption key,
    # used to encrypt sensitive data at rest in etcd.
    vault:
      # -- Url is the URL of the Vault server.
      url: ""
      # -- Token is the authentication token for the Vault server.
      # Tip: Use additionalConfigSources to load this from an existing Secret,
      # or set the VAULT_TOKEN environment variable via env/envFrom.
      token: ""
      # K8sAuthMountPath is the mount path of the Kubernetes auth method in Vault. When not set, it defaults to
      # "kubernetes". This is useful when Vault is running on a different cluster and has multiple Kubernetes auth
      # mounts.
      #k8sAuthMountPath: ""
    # Sqlite contains SQLite storage backend configuration. It is used to store machine logs, audit logs, discovery
    # service state, and as the secondary storage for the frequently updated and less critical data.
    sqlite:
      # -- Path to the SQLite database (secondary storage).
      # This path is mounted from the persistent volume by default.
      path: /data/secondary-storage/sqlite.db
      # ExperimentalBaseParams contains the base parameters to be used when opening the SQLite database connection.
      # This can cause data corruption if set incorrectly, modify at your own risk. This flag is experimental and may
      # be removed in future versions. It must not start with a question mark (?).
      #experimentalBaseParams: _txlock=immediate&_pragma=busy_timeout(50000)&_pragma=journal_mode(WAL)&_pragma=synchronous(NORMAL)
      # ExtraParams contains the extra parameters to be used when opening the SQLite database connection. This can
      # cause data corruption if set incorrectly, modify at your own risk. It must not start with an ampersand (&).
      #extraParams: ""
      # CachedPoolSize controls the number of cached connections in the SQLite connection pool. The overall number of
      # connections is limited by poolSize. CachedPoolSize should be less or equal to poolSize.
      #cachedPoolSize: 4
      # PoolSize controls the maximum number of connections in the SQLite connection pool. Raising this value may
      # improve performance under high load, at the cost of increased resource usage.
      #poolSize: 64
      # @ignored
      metrics:
        # RefreshInterval is the interval at which SQLite metrics are refreshed.
        #refreshInterval: 2m0s
        # RefreshTimeout is the timeout for refreshing SQLite metrics.
        #refreshTimeout: 1m0s
  # EtcdBackup contains etcd backup configuration for the clusters on Omni.
  etcdBackup:
    # -- LocalPath is the local path where etcd backups are stored.
    # Path-based backups are enabled when this is set.
    # This path is mounted from the persistent volume by default.
    localPath: /data/etcd-backup
    # -- S3Enabled controls whether an S3-compatible storage is used for etcd backups. Mutually exclusive with
    # localPath (.localPath).
    s3Enabled: false
    # TickInterval is the interval between etcd backups ticks (controller events to check if any cluster needs to be
    # backed up)
    #tickInterval: 1m0s
    # MinInterval is the minimum interval between two etcd backups for a cluster.
    #minInterval: 1h0m0s
    # MaxInterval is the maximum interval between two etcd backups for a cluster.
    #maxInterval: 24h0m0s
    # UploadLimitMbps is the optional upload bandwidth limit for etcd backups to remote storage in megabits per
    # second. If not specified or is set to 0, it is unlimited.
    #uploadLimitMbps: 0
    # DownloadLimitMbps is the optional download bandwidth limit for etcd backups from remote storage in megabits
    # per second. If not specified or is set to 0, it is unlimited.
    #downloadLimitMbps: 0
    # Jitter is the jitter for etcd backups, randomly added/subtracted from the interval between automatic etcd
    # backups.
    #jitter: 10m0s
  # @ignored
  # Registries contains container image registries configuration.
  registries:
    # Talos is the Talos installer registry configuration.
    #talos: ghcr.io/siderolabs/installer
    # Kubernetes is the Kubernetes container registry configuration.
    #kubernetes: ghcr.io/siderolabs/kubelet
    # ImageFactoryBaseURL is the base URL of the Image Factory service used to build custom machine images.
    #imageFactoryBaseURL: https://factory.talos.dev
    # ImageFactoryPXEBaseURL is the base URL of the Image Factory PXE endpoint used to build custom PXE boot images.
    #imageFactoryPXEBaseURL: ""
    # Mirrors is the list of container image registry mirrors. Used mainly for the development purposes. It must be
    # in the format: <registry host>=<mirror URL>
    #mirrors: []
  # @ignored
  # Debug contains debug-related configuration.
  debug:
    # Server contains debug server configuration.
    server:
      # Endpoint is the network endpoint the debug server listens on. It is in the form "[host]:port".
      #endpoint: ":9988"
    # Pprof contains pprof profiling configuration.
    pprof:
      # Endpoint is the network endpoint the pprof server listens on. It is in the form "[host]:port".
      #endpoint: ""
  # @ignored
  # Features contains feature flags to enable/disable various Omni features.
  features:
    # EnableTalosPreReleaseVersions controls whether pre-release Talos versions (e.g., release candidates, betas)
    # are available for selection when creating/upgrading clusters.
    #enableTalosPreReleaseVersions: false
    # EnableBreakGlassConfigs controls whether break-glass machine configurations are enabled. Break-glass configs
    # allow direct access to the machines without going through Omni. Recommended to be disabled.
    #enableBreakGlassConfigs: false
    # EnableConfigDataCompression controls whether machine configuration data stored in etcd is compressed to save
    # space.
    #enableConfigDataCompression: true
    # EnableClusterImport controls whether the cluster import feature is enabled. When enabled, users can import
    # existing Talos clusters into Omni.
    #enableClusterImport: true
    # DisableControllerRuntimeCache controls whether the controller-runtime cache is disabled. When disabled, etcd
    # is accessed for all reads. Recommended to be enabled, unless debugging specific issues.
    #disableControllerRuntimeCache: false
  # @ignored
  # EulaAccept contains the identity of the person accepting the EULA via CLI flags or config.
  eulaAccept:
    # Name is the full name of the person accepting the EULA on behalf of this Omni instance.
    #name: ""
    # Email is the email address of the person accepting the EULA on behalf of this Omni instance.
    #email: ""
# ---------- END helmvaluesgen config ----------

# -- Environment variables to pass to Omni.
env: []

# -- envFrom to pass to Omni.
envFrom: []
#- configMapRef:
#    name: config-map-name
#- secretRef:
#    name: secret-name

# Etcd Encryption Key Configuration
# This secret contains the GPG private key required to decrypt Omni's master key.
# Without this key, Omni cannot decrypt its database and will fail to start.
#
# To create a new GPG key and export it to a file named omni.asc, you can use the following command:
# (export GNUPGHOME=$(mktemp -d); gpg --batch --passphrase '' --quick-gen-key x; gpg -a --export-secret-key > omni.asc; rm -rf $GNUPGHOME)
etcdEncryptionKey:
  # -- Name of an existing Secret containing the GPG private key.
  existingSecret: ""
  # -- GPG private key content (multiline string).
  omniAsc: ""

# Ingress Configuration
# This section configures standard Kubernetes Ingress resources.
# Use this if you are using an Ingress Controller like NGINX, Traefik, or HAProxy.
ingress:
  # Ingress for the Web UI and gRPC API
  main:
    # -- Enable ingress for Web UI and gRPC API.
    enabled: false
    # -- Set to true to skip validation between this Ingress and config.services.api.advertisedURL
    skipConfigCheck: false
    # -- Additional Annotations.
    # The default annotations ensure compatibility with NGINX Ingress Controller.
    # They are ignored by other ingress controllers.
    annotations:
      nginx.ingress.kubernetes.io/backend-protocol: GRPC
      nginx.ingress.kubernetes.io/proxy-body-size: 32m
      nginx.ingress.kubernetes.io/service-upstream: "true"
    # -- Additional Labels
    labels: {}
    # -- Ingress Class Name
    className: ""
    # -- Omni hostname
    host: omni.example.com
    # -- TLS configuration
    tls: []
    #- secretName: omni-tls
    #  hosts:
    #    - omni.example.com
  # Ingress for the Kubernetes Proxy
  kubernetesProxy:
    # -- Enable ingress for Kubernetes Proxy.
    enabled: false
    # -- Set to true to skip validation between this Ingress and config.services.kubernetesProxy.advertisedURL
    skipConfigCheck: false
    # -- Additional Annotations
    annotations: {}
    # -- Additional Labels
    labels: {}
    # -- Ingress Class Name
    className: ""
    # -- Omni Kubernetes Proxy hostname
    host: kubernetes.omni.example.com
    # -- TLS configuration
    tls: []
    #- secretName: omni-k8s-proxy-tls
    #  hosts:
    #    - kubernetes.omni.example.com
  # Ingress for the SideroLink Machine API
  siderolinkApi:
    # -- Enable ingress for SideroLink Machine API.
    enabled: false
    # -- Set to true to skip validation between this Ingress and config.services.machineAPI.advertisedURL
    skipConfigCheck: false
    # -- Additional Annotations.
    # The default annotations ensure compatibility with NGINX Ingress Controller.
    # They are ignored by other ingress controllers.
    annotations:
      nginx.ingress.kubernetes.io/backend-protocol: GRPC
      nginx.ingress.kubernetes.io/proxy-body-size: 100m
    # -- Additional Labels
    labels: {}
    # -- Ingress Class Name
    className: ""
    # -- Omni SideroLink Machine API hostname
    host: siderolink.omni.example.com
    # -- TLS configuration
    tls: []
    #- secretName: omni-siderolink-tls
    #  hosts:
    #    - siderolink.omni.example.com

# Gateway API Configuration
# NOTE: Gateway API support is in EXPERIMENTAL status
# Support depends on your Gateway controller implementation
gatewayApi:
  # Route for the Web UI
  ui:
    # -- Enable HTTPRoute for Web UI.
    enabled: false
    # -- Additional Annotations
    annotations: {}
    # -- Additional Labels
    labels: {}
    # -- The Gateway(s) to attach this route to.
    # You MUST define at least one parentRef for the route to be active.
    parentRefs: []
    #- name: my-gateway
    #  namespace: my-gateway-namespace
    #  sectionName: https-listener
    # -- Omni UI hostname
    hostnames:
      - omni.example.com
  # Route for the Kubernetes Proxy
  kubernetesProxy:
    # -- Enable HTTPRoute for Kubernetes Proxy.
    enabled: false
    # -- Additional Annotations
    annotations: {}
    # -- Additional Labels
    labels: {}
    # -- The Gateway(s) to attach this route to.
    # You MUST define at least one parentRef for the route to be active.
    parentRefs: []
    #- name: my-gateway
    #  namespace: my-gateway-namespace
    #  sectionName: https-listener
    # -- Omni Kubernetes Proxy hostname
    hostnames:
      - kubernetes.omni.example.com
  # Route for the SideroLink Machine API
  siderolinkApi:
    # -- Enable GRPCRoute for SideroLink Machine API.
    enabled: false
    # -- Additional Annotations
    annotations: {}
    # -- Additional Labels
    labels: {}
    # -- The Gateway(s) to attach this route to.
    # You MUST define at least one parentRef for the route to be active.
    parentRefs: []
    #- name: my-gateway
    #  namespace: my-gateway-namespace
    #  sectionName: https-listener
    # -- Omni SideroLink Machine API hostname
    hostnames:
      - siderolink.omni.example.com


# Probes Configuration
# -- Liveness probe configuration.
livenessProbe: {}
# -- Readiness probe configuration.
readinessProbe:
  failureThreshold: 3
  httpGet:
    path: /healthz
    port: omni
    scheme: HTTP
  periodSeconds: 5
  successThreshold: 1
  timeoutSeconds: 3


# Persistence Configuration
# This volume stores all critical state: the internal database (etcd/sqlite), encryption keys,
# generated machine configurations, and logs.
# If disabled, all cluster state and identity will be lost upon pod restart.
persistence:
  # -- Enable persistence. Mounts to `/data` inside the container.
  enabled: true
  # -- Annotations
  annotations: {}
  # -- Name of an existing PersistentVolumeClaim to use.
  # If set, a new PVC will NOT be created.
  existingClaim: ""
  # -- Storage Class to use for the PVC.
  # Leave empty to use the cluster's default storage class.
  storageClassName: ""
  # -- Access modes for the PVC.
  # 'ReadWriteOnce' is recommended as Omni does not support multiple active replicas writing to the same file-based DB.
  accessModes:
    - ReadWriteOnce
  # -- Size of the persistent volume.
  # Recommended: 16Gi+ for production to handle etcd snapshots and logs.
  size: 16Gi


# Resources Configuration
# -- CPU and Memory resource requests and limits.
resources: {}
#limits:
#  cpu: 100m
#  memory: 128Mi
#requests:
#  cpu: 100m
#  memory: 128Mi


# -- Pod Security Context
# Omni container-level security context
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
    add:
      - NET_ADMIN


# Service Configuration
# Configures the Kubernetes Services to expose Omni's network endpoints.
# - 'main': Exposes the HTTP/gRPC API, UI and SideroLink API (ClusterIP by default). Uses h2c (HTTP/2 cleartext).
# - 'k8sProxy': Exposes the Kubernetes API proxy (ClusterIP by default). Separate service because it does not support h2c.
# - 'wireguard': Exposes the UDP wireGuard interface for SideroLink (NodePort/LoadBalancer required for external access).
service:
  main:
    # -- Annotations for the main service.
    # Traefik does not yet support appProtocol (https://github.com/traefik/traefik/issues/11089),
    # so this annotation is needed to tell Traefik to use h2c when communicating with the backend.
    # It is ignored by other ingress controllers.
    annotations:
      traefik.ingress.kubernetes.io/service.serversscheme: h2c
    # -- Additional labels for the main service.
    labels: {}
    # -- Service type for the main service.
    type: ClusterIP
    # -- Port for the Omni HTTP/gRPC API and UI.
    omniPort: 8080
    # -- NodePort for the Omni HTTP/gRPC API (only used when type is NodePort).
    omniNodePort: ""
    # -- Port for the SideroLink API.
    siderolinkApiPort: 8090
    # -- NodePort for the SideroLink API (only used when type is NodePort).
    siderolinkApiNodePort: ""
    # -- ClusterIP for the main service.
    clusterIP: ""
    # -- LoadBalancer IP for the main service (only used when type is LoadBalancer).
    loadBalancerIP: ""
  # Kubernetes proxy service configuration.
  # This is a separate service because the Kubernetes proxy does not support h2c,
  # and the h2c annotation on the main service would break it.
  k8sProxy:
    # -- Annotations for the Kubernetes proxy service.
    annotations: {}
    # -- Additional labels for the Kubernetes proxy service.
    labels: {}
    # -- Service type for the Kubernetes proxy service.
    type: ClusterIP
    # -- Port for the Kubernetes proxy.
    port: 8095
    # -- ClusterIP for the Kubernetes proxy service.
    clusterIP: ""
  wireguard:
    # -- Annotations for the WireGuard service.
    annotations: {}
    # -- Additional labels for the WireGuard service.
    labels: {}
    # -- Service type for WireGuard (NodePort or LoadBalancer recommended).
    type: NodePort
    # -- Port for the WireGuard service.
    port: 50180
    # -- NodePort for the WireGuard service.
    nodePort: 30180
    # -- ClusterIP for the WireGuard service.
    clusterIP: ""
# Omni metrics configuration
metrics:
  # -- Deploy metrics service
  enabled: false
  service:
    # -- Metrics service type
    type: ClusterIP
    # -- Metrics service clusterIP. `None` makes a "headless service" (no virtual IP)
    clusterIP: ""
    # -- Metrics service annotations
    annotations: {}
    # -- Metrics service labels
    labels: {}
    # -- Metrics service port
    servicePort: 2122
  serviceMonitor:
    # -- Enable a prometheus ServiceMonitor
    enabled: false
    # -- Prometheus ServiceMonitor interval
    interval: 30s
    # -- Prometheus ServiceMonitor scrapeTimeout. If empty, Prometheus uses the global scrape timeout unless it is less than the target's scrape interval value in which the latter is used.
    scrapeTimeout: ""
    # -- When true, honorLabels preserves the metric's labels when they collide with the target's labels.
    honorLabels: false
    # -- Prometheus [RelabelConfigs] to apply to samples before scraping
    relabelings: []
    # -- Prometheus [MetricRelabelConfigs] to apply to samples before ingestion
    metricRelabelings: []
    # -- Prometheus ServiceMonitor scheme
    scheme: ""
    # -- Prometheus ServiceMonitor tlsConfig
    tlsConfig: {}
    # -- Prometheus ServiceMonitor namespace
    namespace: "" # "monitoring"
    # -- Prometheus ServiceMonitor selector
    selector: {}
    #prometheus: kube-prometheus
    # -- Prometheus ServiceMonitor labels
    labels: {}
    # -- Prometheus ServiceMonitor annotations
    annotations: {}
  rules:
    # -- Deploy a PrometheusRule for the application controller
    enabled: false
    # -- PrometheusRule namespace
    namespace: "" # "monitoring"
    # -- PrometheusRule selector
    selector: {}
    #prometheus: kube-prometheus
    # -- PrometheusRule labels
    labels: {}
    # -- PrometheusRule annotations
    annotations: {}
    # -- PrometheusRule.Spec for the application controller
    spec: []

# Service Account Configuration
serviceAccount:
  # -- Whether to create a ServiceAccount for Omni
  create: true
  # -- Automount API credentials for a ServiceAccount
  automount: false
  # -- Annotations for the ServiceAccount
  annotations: {}
  # -- Name of the ServiceAccount to use.
  # If not set and create is true, a name is generated using the fullname template.
  name: ""

# -- List of additional mounts to add (normally used with extraVolumes)
extraVolumeMounts: []

# -- List of extra volumes to add
extraVolumes: []

# -- Pod affinity settings for the Omni pod
affinity: {}

# -- Node selector to constrain which nodes the Omni pod is scheduled on
nodeSelector: {}

# -- Additional annotations to add to the Omni pod
podAnnotations: {}

# -- Additional labels to add to the Omni pod
podLabels: {}

# -- Use host networking for the Omni pod.
# This may be required in some environments (e.g., GKE with Container-Optimized OS)
# where the NET_ADMIN capability alone is not sufficient for creating the WireGuard interface.
# When enabled, dnsPolicy is automatically set to ClusterFirstWithHostNet (unless dnsPolicy is explicitly set).
hostNetwork: false

# -- DNS policy for the Omni pod.
# When not set and hostNetwork is enabled, defaults to ClusterFirstWithHostNet.
dnsPolicy: ""

# -- DNS configuration for the Omni pod.
dnsConfig: {}
#  nameservers:
#    - 1.1.1.1
#  searches:
#    - my-domain.local

# -- Priority class name for the Omni pod.
priorityClassName: ""

# -- Termination grace period in seconds for the Omni pod.
terminationGracePeriodSeconds: 30

# -- Init containers to add to the Omni pod.
initContainers: []
#  - name: wait-for-etcd
#    image: busybox:latest
#    command: ['sh', '-c', 'until nc -z etcd.etcd.svc.cluster.local 2379; do sleep 1; done']

# -- Extra containers (sidecars) to add to the Omni pod.
extraContainers: []

# -- Pod-level security context
podSecurityContext: {}

# -- Tolerations for the Omni pod
tolerations: []

# -- Extra Kubernetes objects to deploy with the helm chart
extraObjects: []
#- apiVersion: v1
