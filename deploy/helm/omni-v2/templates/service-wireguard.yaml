apiVersion: v1
kind: Service
metadata:
  name: {{ include "omni-v2.fullname" . }}-wireguard
  labels:
    {{- include "omni-v2.labels" . | nindent 4 }}
  {{- with .Values.service.wireguard.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.wireguard.type }}
  {{- with .Values.service.wireguard.clusterIP }}
  clusterIP: {{ . | quote}}
  {{- end }}
  ports:
    - name: wireguard
      {{- with .Values.service.wireguard.nodePort }}
      nodePort: {{ .}}
      {{- end }}
      port: {{ .Values.service.wireguard.port }}
      targetPort: wireguard
      protocol: UDP
  selector:
    {{- include "omni-v2.selectorLabels" . | nindent 4 }}
