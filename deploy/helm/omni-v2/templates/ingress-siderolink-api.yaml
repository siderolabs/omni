{{- if .Values.ingress.siderolinkApi.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "omni-v2.fullname" . }}-siderolink
  labels:
    {{- include "omni-v2.labels" . | nindent 4 }}
  {{- with .Values.ingress.siderolinkApi.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.siderolinkApi.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ingress.siderolinkApi.tls }}
  tls:
    - hosts:
        - {{ .Values.ingress.siderolinkApi.host | quote }}
      secretName: {{ .Values.ingress.siderolinkApi.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.siderolinkApi.host | quote }}
      http:
        paths:
          - path: /
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ include "omni-v2.fullname" $ }}
                port:
                  number: {{ .Values.service.main.siderolinkApiPort }}
{{- end }}
