{{- if .Values.ingress.grpc.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "omni-v2.fullname" . }}-grpc
  labels:
    {{- include "omni-v2.labels" . | nindent 4 }}
  {{- with .Values.ingress.grpc.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.grpc.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ingress.grpc.tls }}
  tls:
    - hosts:
        - {{ .Values.ingress.grpc.host | quote }}
      secretName: {{ .Values.ingress.grpc.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.grpc.host | quote }}
      http:
        paths:
          - path: omni.resources.ResourceService
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ include "omni-v2.fullname" $ }}
                port:
                  number: {{ .Values.service.main.omniPort }}
          - path: oidc.OIDCService
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ include "omni-v2.fullname" $ }}
                port:
                  number: {{ .Values.service.main.omniPort }}
          - path: management.ManagementService
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ include "omni-v2.fullname" $ }}
                port:
                  number: {{ .Values.service.main.omniPort }}
          - path: auth.AuthService
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ include "omni-v2.fullname" $ }}
                port:
                  number: {{ .Values.service.main.omniPort }}
          - path: cosi.resource.State
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ include "omni-v2.fullname" $ }}
                port:
                  number: {{ .Values.service.main.omniPort }}
{{- end }}
