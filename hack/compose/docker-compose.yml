services:
  dlv-init:
    image: golang:1.26-alpine
    restart: on-failure
    volumes:
      - dlv-tools:/output
      - ./launcher:/launcher:ro
    command: >-
      sh -c "test -f /output/launcher || (cd /launcher && CGO_ENABLED=0 GOOS=linux GO111MODULE=off go build -o /output/launcher .); [ '${WITH_DEBUG:-false}' != 'true' ] || test -f /output/dlv || (CGO_ENABLED=0 go install github.com/go-delve/delve/cmd/dlv@1.26.3 && cp /go/bin/dlv /output/)"

  omni:
    network_mode: host
    devices:
      - /dev/net/tun
    depends_on:
      vault-dev:
        condition: service_started
      node-dev:
        condition: service_started
      minio-mc:
        condition: service_started
      dlv-init:
        condition: service_completed_successfully
    volumes:
      - etcd:/_out/etcd
      - logs:/_out/logs
      - secondary-storage:/_out/secondary-storage
      - etcd-backup:/tmp/omni-data/etcd-backup
      - audit-logs:/tmp/omni-data/audit-logs
      - ../generate-certs/certs:/etc/ssl/omni-certs:ro
      - dlv-tools:/debug:ro
    container_name: local-omni
    restart: on-failure
    cap_add:
      - NET_ADMIN
      - SYS_PTRACE
    entrypoint:
      - /debug/launcher
    build:
      context: ../../
      dockerfile: Dockerfile
      args:
        - ARTIFACTS=${ARTIFACTS:?error}
        - SHA=${SHA:?error}
        - TAG=${TAG:?error}
        - USERNAME=${USERNAME:?error}
        - REGISTRY=${REGISTRY:?error}
        - JS_TOOLCHAIN=${JS_TOOLCHAIN:?error}
        - PROTOBUF_GRPC_GATEWAY_TS_VERSION=${PROTOBUF_GRPC_GATEWAY_TS_VERSION:?error}
        - NODE_BUILD_ARGS=${NODE_BUILD_ARGS}
        - TOOLCHAIN=${TOOLCHAIN:?error}
        - CGO_ENABLED=${CGO_ENABLED:?error}
        - GO_BUILDFLAGS=${GO_BUILDFLAGS}
        - GOLANGCILINT_VERSION=${GOLANGCILINT_VERSION:?error}
        - GOFUMPT_VERSION=${GOFUMPT_VERSION:?error}
        - GOIMPORTS_VERSION=${GOIMPORTS_VERSION:?error}
        - GOMOCK_VERSION=${GOMOCK_VERSION:?error}
        - PROTOBUF_GO_VERSION=${PROTOBUF_GO_VERSION:?error}
        - GRPC_GO_VERSION=${GRPC_GO_VERSION:?error}
        - GRPC_GATEWAY_VERSION=${GRPC_GATEWAY_VERSION:?error}
        - VTPROTOBUF_VERSION=${VTPROTOBUF_VERSION:?error}
        - DEEPCOPY_VERSION=${DEEPCOPY_VERSION:?error}
        - DIS_VULNCHECK_VERSION=${DIS_VULNCHECK_VERSION:?error}
        - TESTPKGS=${TESTPKGS:?error}
        - GO_LDFLAGS=${GO_LDFLAGS}
        - GOEXPERIMENT=${GOEXPERIMENT}
        # Controls build-time debug flags.
        - WITH_DEBUG=${WITH_DEBUG:-false}
        - GOTOOLCHAIN=${GOTOOLCHAIN}
        - DIS_VULNCHECK_VERSION=${DIS_VULNCHECK_VERSION}
    environment:
      - VAULT_ADDR=http://127.0.0.1:8200
      - VAULT_TOKEN=dev-o-token
      - SIDEROLINK_DEV_JOIN_TOKEN=w7uVuW3zbVKIYQuzEcyetAHeYMeo5q2L9RvkAVfCfSCD
      # Controls runtime debug flags.
      - WITH_DEBUG=${WITH_DEBUG:-false}
      - DELVE_LISTEN_ADDR=${DELVE_LISTEN_ADDR:-127.0.0.1:12345}
    command: >-
      --sqlite-storage-path=/_out/secondary-storage/sqlite.db

  vault-dev:
    container_name: local-vault
    image: hashicorp/vault:1.18
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=dev-o-token
    cap_add:
      - IPC_LOCK
    ports:
      - "127.0.0.1:8200:8200"

  vault-startup:
    depends_on:
      - vault-dev
    restart: on-failure
    container_name: local-vault-init
    image: hashicorp/vault:1.18
    volumes:
      - ../../internal/backend/runtime/omni/testdata/pgp/new_key.private:/tmp/key.private:ro
    environment:
      - VAULT_ADDR=http://vault-dev:8200
      - VAULT_TOKEN=dev-o-token
    entrypoint: >-
      vault kv put
      -mount=secret
      omni-private-key
      private-key=@/tmp/key.private
      || sleep 15 && exit 1

  node-dev:
    network_mode: host
    container_name: local-node
    image: node:24.15.0-alpine
    volumes:
      - ../../frontend:/app:rw
    working_dir: /app
    command: sh -c 'npm i && npm run serve'
    stop_signal: SIGKILL

  minio-server:
    image: minio/minio:latest
    volumes:
      - minio:/minio-server
    ports:
      - "127.0.0.1:9000:9000"
    environment:
      MINIO_ROOT_USER: access
      MINIO_ROOT_PASSWORD: secret123
    command: server /minio-server/export

  prometheus:
    network_mode: host
    image: prom/prometheus
    depends_on:
      - omni
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  minio-mc:
    image: minio/mc:latest
    container_name: minio-mc
    depends_on:
      - minio-server
    entrypoint: /bin/sh
    restart: on-failure
    command: -c "mc alias set myminio http://minio-server:9000 access secret123 && mc mb --ignore-existing myminio/mybucket"

  omni-inspector:
    image: ghcr.io/siderolabs/omni-inspector:latest
    container_name: omni-inspector
    depends_on:
      - omni
    network_mode: host
    restart: on-failure
    command: >-
      --omni-debug=${WITH_DEBUG:-false}

  grafana:
    network_mode: host
    image: grafana/grafana:latest
    restart: on-failure
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana

volumes:
  etcd:
  logs:
  minio:
  secondary-storage:
  etcd-backup:
  audit-logs:
  grafana_data:
  dlv-tools:
