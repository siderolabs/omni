# commit to be tagged for the new release
commit = "HEAD"

project_name = "Omni"
github_repo = "siderolabs/omni"
match_deps = "^github.com/((talos-systems|siderolabs)/[a-zA-Z0-9-]+)$"

pre_release = false
previous = "v1.7.0"

[notes.aaa-upgrade-nodes]
title = "Urgent Upgrade Notes **(No, really, you MUST read this before you upgrade)**"
description = """\
As Omni is now using `--join-tokens-mode=legacyAllowed` by default it won't start if there are any nodes running Talos below 1.6 connected to the instance.
If you want to keep using Omni with the outdated Talos you will need to set the flag to `legacy`. But of course we strongly recommend you to update Talos ASAP.

`omnictl cluster template` has breaking changes: it now restricts including files outside of the current directory.
If using files in the parent dirs, old behavior can be enabled by using `--allowed-dir`.
"""

[notes.powered-off-machines]
title = "Powered Off Machine State"
description = """\
Machines that are shut down now appear as "Powered Off" in the UI instead of being stuck in "Shutting Down" with a greyed-out unreachable state. \
Static infra providers honor the shutdown until the machine goes through a deallocation cycle, instead of automatically powering it back on. \
The CLI gains `omnictl machine shutdown` and `omnictl machine power-on` commands.
"""

[notes.omnictl-media]
title = "`omnictl media` Command Group"
description = """\
A new `omnictl media preset {create,list,delete}` command group manages InstallationMediaConfig presets from the CLI, \
and `omnictl media download <preset>` downloads from them. \
Preset validation runs against the server's CloudPlatformConfig, SBCConfig, and TalosExtensions resources at create time. \
The legacy `omnictl download` is preserved but deprecated.
"""

[notes.installation-media-placeholders]
title = "Installation Media Placeholders"
description = """\
InstallationMediaConfig now accepts empty strings for `talosVersion` and `joinToken`, which resolve to the current stable version and default token at download time. \
The create wizard exposes "Automatic" options for these fields, and the download modal shows version/token/arch pickers for all presets.
"""

[notes.talosctl-from-factory]
title = "Download `talosctl` From Factory"
description = """\
`talosctl` binaries are now downloaded directly from the Talos Image Factory instead of GitHub.
"""

[notes.plain-download-links]
title = "Plain Download Links for Images"
description = """\
The frontend now uses plain browser download links for factory image downloads instead of intercepting them.
"""

[notes.kube-service-multiport]
title = "Multi-Port Workload Proxy"
description = """\
The `omni-kube-service-exposer.sidero.dev/port` annotation now accepts a comma-separated list of `host-port` or `host-port:service-port` entries, \
each producing its own ExposedService URL. Label, icon, and prefix annotations gain per-host-port suffixed variants (e.g. `label-30080`). \
Existing single-port exposed services keep their URLs across the upgrade.
"""

[notes.template-relative-paths]
title = "Template Includes Resolved Relative to Template File"
description = """\
`omnictl cluster template` commands now resolve patch and Kubernetes manifest includes relative to the template YAML file, \
rather than the current working directory of `omnictl`.
"""

[notes.template-allowed-dirs]
title = "Cluster Template Include Directory Restrictions"
description = """\
By default, cluster templates can only include files from the same directory as the template file. \
This prevents malicious templates from including arbitrary files like `/etc/passwd`. \
The previous behavior can be restored with `--allowed-dir`.
"""

[notes.template-inline-raw-bytes]
title = "Raw Bytes Support in Template Inline Fields"
description = """\
Inline fields for manifests and config patches now accept three forms: a single inline map (for backward compatibility), a list of inline maps, or raw bytes (which may contain multiple YAML documents). \
`omnictl cluster template export` now exports patches and manifests as raw bytes so multi-document values round-trip correctly.
"""

[notes.imported-cluster-secrets-cleanup]
title = "Imported Cluster Secrets Cleanup"
description = """\
A new controller tears down `ImportedClusterSecrets` once their content has been copied into `ClusterSecrets` and marked `Imported=true`, \
so imported bootstrap material does not linger in the state after a successful import.
"""

[notes.image-factory-provider-proxy]
title = "Image Factory Proxy for Infra Providers"
description = """\
Infra provider Image Factory requests can now be proxied through Omni via a new schematic creation API that accepts raw YAML. \
This is useful when Omni holds authentication for the Image Factory or when multiple Image Factory endpoints need to be supported.
"""

[notes.image-factory-legacy-removed]
title = "Legacy Installation Media Proxying Removed"
description = """\
Omni no longer proxies legacy installation media download requests to the Talos Image Factory. \
Such requests are now rejected with a message asking users to upgrade `omnictl`, which downloads installation media directly from the factory.
"""

[notes.infra-provider-factory-endpoint]
title = "Infra Provider Factory Endpoint"
description = """\
Infra providers now use the Image Factory endpoint configured in Omni's features state (sourced from args/config) instead of a hardcoded default. \
The configured factory URL is exposed on the provider.
"""

[notes.machine-request-errors]
title = "Provision Step Errors on Machine Requests"
description = """\
A new `Error` field on `ClusterMachineRequestStatus` surfaces provision step failures so users can see why a request is stuck without scraping logs. \
Errors are now persisted on both failure and requeue paths.
"""

[notes.talos-end-of-support]
title = "Talos Version End-of-Support Notifications"
description = """\
Omni now tracks machines running Talos versions approaching or past end of support relative to `MinTalosVersion`, \
emits two new notifications (approaching end of support, end of support reached), and exposes Prometheus metrics for both.
"""

[notes.audit-log-filters]
title = "Additional Audit Log Filters"
description = """\
Audit logs gain a generic search box and sortable columns in the UI, plus CLI filters for `event_type`, `resource_type`, `resource_id`, `cluster_id`, and `actor`.
"""

[notes.service-account-key-tracking]
title = "Per-Key Creation and Last-Active Tracking for Service Accounts"
description = """\
Service account key listings now include per-key creation timestamps and last-active times. \
`omnictl serviceaccount list` shows `KEY CREATED` and `KEY LAST ACTIVE` columns alongside the existing SA-level `LAST ACTIVE`. \
A new `PublicKeyLastActive` resource backs this tracking, and the activity interceptor records last-used timestamps per signing key fingerprint.
"""

[notes.serviceaccount-create-comment]
title = "Commented `omnictl serviceaccount create` Output"
description = """\
The output of `omnictl serviceaccount create` is now commented out by default, making it friendlier for piping into `.env` files and shell automation.
"""

[notes.join-token-reader-access]
title = "Reader Access to Join Tokens"
description = """\
Users with the reader role can now read join tokens.
Reader had access to it before through Talos logs, so making the access more consistent.
More fine grained access will come with RBAC v2 later on.
"""

[notes.etcd-write-metrics]
title = "Per-Actor etcd Write Metrics"
description = """\
New `omni_etcd_operations_total` and `omni_etcd_resource_bytes_total` Prometheus counters track etcd writes, \
split by operation (create/update/teardown/destroy), actor (internal/user/service account/infra provider), actor ID, and resource type. \
Byte sizes are captured from the actual on-disk payload via a new `WithObserver` hook in `state-etcd`.
"""

[notes.log-config]
title = "Configurable Log Level and Format"
description = """\
Omni's log level and log format are now configurable via flags and config.
"""

[notes.helm-values-from-schema]
title = "Helm Chart Values Generated From Config Schema"
description = """\
A new `helmvaluesgen` tool, run on `make generate`, updates the `config:` section of the Helm chart's `values.yaml` from Omni's config schema, \
applying chart-specific overrides for defaults, omissions, and descriptions.
"""

[notes.frontend-qol-machines]
title = "Frontend Quality-of-Life Improvements for Machines"
description = """\
The cluster machine page gains a copy-UUID button, the machines list page can toggle between hostnames and UUIDs (with the preference saved), \
and machine and cluster machine pages gain kernel args tabs for editing kernel arguments inline instead of through a modal.
"""

[notes.frontend-disks-devices]
title = "Disks and Devices on Machine Pages"
description = """\
The frontend now shows disks and devices on the machines and individual machine pages.
"""

[notes.frontend-machine-switching]
title = "Quick Switching Between Cluster Machines"
description = """\
The frontend allows quickly switching between machines within a cluster from the machine detail view.
"""

[notes.frontend-log-switching]
title = "Switching Logs Inside the Logs Tab"
description = """\
The logs tab now allows switching between log sources directly inside the tab.
"""

[notes.frontend-support-modal]
title = "Support Modal"
description = """\
A new support modal in the frontend exposes links to GitHub issues, support channels, documentation, community resources, and office hours.
"""

[notes.frontend-notifications]
title = "In-UI Notifications"
description = """\
Omni notifications are now shown in the UI as dismissible banners.
"""

[notes.frontend-resave-support-bundle]
title = "Re-Saving the Omni Support Bundle"
description = """\
The frontend now allows re-saving a previously generated Omni support bundle without regenerating it.
"""

[notes.frontend-installation-media-version]
title = "Talos Version Text on Installation Media Wizard"
description = """\
The installation media wizard's Talos version text has been updated for clarity.
"""
